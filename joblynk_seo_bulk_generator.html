
<h2 class="sr-only">JobLynk SEO Bulk Article Generator — generates 10 ready-to-push Markdown files with internal links and sitemap script</h2>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.wrap { padding: 1.5rem 0; }

.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

.topics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 1.5rem;
}

.topic-card {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
}
.topic-card.active { border-color: var(--color-border-info); background: var(--color-background-info); }
.topic-card .num { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; margin-bottom: 2px; }
.topic-card .title { font-size: 12px; color: var(--color-text-primary); font-weight: 500; line-height: 1.3; }
.topic-card.active .title { color: var(--color-text-info); }

.controls { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.controls select { font-size: 13px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }

.btn-gen { padding: 8px 20px; font-size: 14px; font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; gap: 6px; }
.btn-gen:hover { background: var(--color-background-secondary); }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-gen.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.btn-gen.primary:hover { opacity: 0.85; }

.progress-bar { height: 4px; background: var(--color-background-secondary); border-radius: 99px; margin-bottom: 1rem; overflow: hidden; display: none; }
.progress-fill { height: 100%; background: var(--color-text-info); border-radius: 99px; width: 0%; transition: width 0.4s ease; }

.status-row { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; min-height: 18px; }

.output-area { display: none; }
.output-tabs { display: flex; gap: 4px; margin-bottom: 0; flex-wrap: wrap; }
.tab-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
.tab-btn.active { background: var(--color-background-primary); border-color: var(--color-border-primary); color: var(--color-text-primary); font-weight: 500; }

.file-viewer {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  margin-top: 8px;
}
.file-header { 
  display: flex; align-items: center; justify-content: space-between; 
  padding: 10px 14px; border-bottom: 0.5px solid var(--color-border-tertiary);
}
.file-header .fname { font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); }
.file-header .copy-btn { font-size: 12px; padding: 4px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.file-header .copy-btn:hover { background: var(--color-background-secondary); }

.file-content { padding: 14px; font-size: 12px; font-family: var(--font-mono); color: var(--color-text-primary); white-space: pre-wrap; line-height: 1.6; max-height: 380px; overflow-y: auto; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-card .s-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-card .s-lab { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

.dl-all { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; }
.badge.green { background: var(--color-background-success); color: var(--color-text-success); }
.badge.blue { background: var(--color-background-info); color: var(--color-text-info); }
</style>

<div class="wrap">
  <div class="header">
    <h1><i class="ti ti-article" aria-hidden="true" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>JobLynk SEO bulk generator</h1>
    <p>10 Markdown articles · internal linking · sitemap script · Git-ready</p>
  </div>

  <div class="topics-grid" id="topicsGrid"></div>

  <div class="controls">
    <select id="wordCount">
      <option value="600">~600 words</option>
      <option value="900" selected>~900 words</option>
      <option value="1200">~1200 words</option>
    </select>
    <select id="tone">
      <option value="professional">Professional tone</option>
      <option value="conversational" selected>Conversational tone</option>
      <option value="authoritative">Authoritative tone</option>
    </select>
    <button class="btn-gen primary" id="genAllBtn" onclick="generateAll()">
      <i class="ti ti-player-play" aria-hidden="true"></i> Generate all 10 articles
    </button>
    <button class="btn-gen" id="genSitemapBtn" onclick="generateSitemapScript()" disabled>
      <i class="ti ti-sitemap" aria-hidden="true"></i> Get sitemap script
    </button>
  </div>

  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status-row" id="statusRow"></div>

  <div class="output-area" id="outputArea">
    <div class="stats-row" id="statsRow"></div>
    <div class="output-tabs" id="outputTabs"></div>
    <div class="file-viewer">
      <div class="file-header">
        <span class="fname" id="activeFileName"></span>
        <button class="copy-btn" onclick="copyActive()"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
      </div>
      <div class="file-content" id="fileContent"></div>
    </div>
    <div class="dl-all">
      <button class="btn-gen" onclick="downloadAll()"><i class="ti ti-download" aria-hidden="true"></i> Download all as .zip instructions</button>
      <button class="btn-gen" onclick="copyGitInstructions()"><i class="ti ti-brand-git" aria-hidden="true"></i> Git push instructions</button>
    </div>
  </div>
</div>

<script>
const TOPICS = [
  { slug: "how-to-write-a-winning-resume", title: "How to write a winning resume", kw: "resume writing tips" },
  { slug: "top-interview-tips-for-freshers", title: "Top interview tips for freshers", kw: "interview tips freshers" },
  { slug: "remote-jobs-guide-india", title: "Complete guide to remote jobs in India", kw: "remote jobs India" },
  { slug: "linkedin-profile-optimization", title: "LinkedIn profile optimization for job seekers", kw: "LinkedIn profile tips" },
  { slug: "highest-paying-jobs-india-2025", title: "Highest paying jobs in India 2025", kw: "highest paying jobs India" },
  { slug: "cover-letter-writing-guide", title: "How to write a cover letter that gets noticed", kw: "cover letter writing" },
  { slug: "career-change-at-30-guide", title: "Career change at 30: a practical guide", kw: "career change at 30" },
  { slug: "freelancing-vs-full-time-employment", title: "Freelancing vs full-time employment: pros and cons", kw: "freelancing vs employment" },
  { slug: "salary-negotiation-tips", title: "Salary negotiation tips to get paid what you deserve", kw: "salary negotiation" },
  { slug: "skills-in-demand-india-2025", title: "Top skills in demand in India for 2025", kw: "skills in demand India 2025" },
];

const BASE_URL = "https://joblynk.live";
let generatedFiles = {};
let activeTab = null;

function renderTopics() {
  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = TOPICS.map((t, i) => `
    <div class="topic-card active" id="tc${i}" onclick="toggleTopic(${i})">
      <div class="num">Article ${i+1}</div>
      <div class="title">${t.title}</div>
    </div>
  `).join('');
}

function toggleTopic(i) {
  const el = document.getElementById('tc' + i);
  el.classList.toggle('active');
}

function getActiveTopics() {
  return TOPICS.filter((_, i) => document.getElementById('tc' + i).classList.contains('active'));
}

function setStatus(msg) { document.getElementById('statusRow').textContent = msg; }
function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }

async function generateAll() {
  const active = getActiveTopics();
  if (!active.length) { setStatus('Select at least one article.'); return; }

  const wordCount = document.getElementById('wordCount').value;
  const tone = document.getElementById('tone').value;

  document.getElementById('genAllBtn').disabled = true;
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('outputArea').style.display = 'none';
  generatedFiles = {};
  setProgress(0);

  for (let i = 0; i < active.length; i++) {
    const topic = active[i];
    setStatus(`Generating article ${i+1}/${active.length}: "${topic.title}"…`);
    setProgress(Math.round((i / active.length) * 90));
    try {
      const md = await generateArticle(topic, active, wordCount, tone);
      generatedFiles[topic.slug] = { content: md, topic };
    } catch(e) {
      generatedFiles[topic.slug] = { content: `# Error generating this article\n\n${e.message}`, topic };
    }
  }

  setProgress(100);
  setStatus(`All ${active.length} articles generated.`);
  document.getElementById('genAllBtn').disabled = false;
  document.getElementById('genSitemapBtn').disabled = false;
  renderOutput(active);
}

async function generateArticle(topic, allTopics, wordCount, tone) {
  const otherTopics = allTopics.filter(t => t.slug !== topic.slug);
  const internalLinks = otherTopics.slice(0, 4).map(t =>
    `[${t.title}](${BASE_URL}/blog/${t.slug})`
  ).join(', ');

  const today = new Date().toISOString().split('T')[0];

  const systemPrompt = `You are an expert SEO content writer for JobLynk (${BASE_URL}), a job portal connecting job seekers with opportunities in India. Write in a ${tone} tone. Always return only the raw Markdown content with YAML frontmatter — no explanation, no backticks wrapping the output.`;

  const userPrompt = `Write an SEO-optimised blog article for joblynk.live with the following spec:

Title: ${topic.title}
Primary keyword: "${topic.kw}"
Target word count: approximately ${wordCount} words
Audience: Indian job seekers aged 21-40

Requirements:
1. Start with YAML frontmatter block:
---
title: "${topic.title}"
slug: "${topic.slug}"
date: "${today}"
description: "A compelling meta description of 150-160 characters with keyword: ${topic.kw}"
keywords: ["${topic.kw}", "jobs", "career", "joblynk"]
author: "JobLynk Editorial"
canonical: "${BASE_URL}/blog/${topic.slug}"
---

2. Write a full, well-structured article with:
   - An engaging H1 (the title)
   - An intro paragraph with the primary keyword in first 100 words
   - 4-6 H2 sections with detailed content under each
   - Numbered or bullet lists where helpful
   - A conclusion with a CTA to search jobs on JobLynk (link: ${BASE_URL}/jobs)
   - Naturally embed these internal links in the body text where contextually relevant: ${internalLinks}

3. Use the keyword "${topic.kw}" naturally 4-6 times throughout.
4. Keep sentences clear and scannable. No keyword stuffing.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1800,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.text || '').join('');
}

async function generateSitemapScript() {
  setStatus('Generating sitemap update script…');
  const slugs = Object.keys(generatedFiles);
  const today = new Date().toISOString().split('T')[0];

  const script = `#!/usr/bin/env node
// sitemap-update.js — auto-generated by JobLynk SEO bulk generator
// Run: node sitemap-update.js
// Then commit & push: git add sitemap.xml && git commit -m "Update sitemap" && git push

const fs = require('fs');
const path = require('path');

const BASE_URL = '${BASE_URL}';
const TODAY = '${today}';

const BLOG_SLUGS = [
${slugs.map(s => `  '${s}',`).join('\n')}
];

const STATIC_PAGES = [
  { url: '/', priority: '1.0', changefreq: 'daily' },
  { url: '/jobs', priority: '0.9', changefreq: 'daily' },
  { url: '/blog', priority: '0.8', changefreq: 'weekly' },
  { url: '/about', priority: '0.6', changefreq: 'monthly' },
  { url: '/contact', priority: '0.5', changefreq: 'monthly' },
];

const blogEntries = BLOG_SLUGS.map(slug => ({
  url: \`/blog/\${slug}\`,
  priority: '0.7',
  changefreq: 'monthly',
}));

const allPages = [...STATIC_PAGES, ...blogEntries];

const xml = \`<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
\${allPages.map(p => \`  <url>
    <loc>\${BASE_URL}\${p.url}</loc>
    <lastmod>\${TODAY}</lastmod>
    <changefreq>\${p.changefreq}</changefreq>
    <priority>\${p.priority}</priority>
  </url>\`).join('\\n')}
</urlset>\`;

const outPath = path.join(__dirname, 'public', 'sitemap.xml');
fs.mkdirSync(path.dirname(outPath), { recursive: true });
fs.writeFileSync(outPath, xml, 'utf8');
console.log(\`Sitemap written to \${outPath} with \${allPages.length} URLs.\`);
`;

  generatedFiles['sitemap-update.js'] = { content: script, topic: { title: 'Sitemap update script' } };
  setStatus('Sitemap script generated.');
  renderOutput(getActiveTopics());
  showTab('sitemap-update.js');
}

function renderOutput(active) {
  const statsRow = document.getElementById('statsRow');
  const totalWords = Object.values(generatedFiles).reduce((acc, f) => {
    if (f.topic.slug) return acc + f.content.split(/\s+/).length;
    return acc;
  }, 0);
  const articleCount = Object.values(generatedFiles).filter(f => f.topic.slug).length;
  const linkCount = articleCount * 4;

  statsRow.innerHTML = `
    <div class="stat-card"><div class="s-val">${articleCount}</div><div class="s-lab">Articles</div></div>
    <div class="stat-card"><div class="s-val">${totalWords.toLocaleString()}</div><div class="s-lab">Total words</div></div>
    <div class="stat-card"><div class="s-val">${linkCount}</div><div class="s-lab">Internal links</div></div>
    <div class="stat-card"><div class="s-val">${articleCount + 5}</div><div class="s-lab">Sitemap URLs</div></div>
  `;

  const tabsEl = document.getElementById('outputTabs');
  const keys = Object.keys(generatedFiles);
  tabsEl.innerHTML = keys.map(k => {
    const label = k === 'sitemap-update.js' ? '⚙ sitemap.js' : k.replace(/-/g,' ').slice(0,20) + (k.length > 20 ? '…' : '');
    return `<button class="tab-btn" id="tab_${k}" onclick="showTab('${k}')">${label}</button>`;
  }).join('');

  document.getElementById('outputArea').style.display = 'block';
  if (keys.length) showTab(keys[0]);
}

function showTab(key) {
  activeTab = key;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabEl = document.getElementById('tab_' + key);
  if (tabEl) tabEl.classList.add('active');
  const f = generatedFiles[key];
  if (!f) return;
  const isScript = key.endsWith('.js');
  document.getElementById('activeFileName').textContent = isScript ? key : `posts/${key}.md`;
  document.getElementById('fileContent').textContent = f.content;
}

function copyActive() {
  if (!activeTab || !generatedFiles[activeTab]) return;
  navigator.clipboard.writeText(generatedFiles[activeTab].content);
  const btn = document.querySelector('.copy-btn');
  btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Copied';
  setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy'; }, 1800);
}

function downloadAll() {
  const instructions = `# Download instructions\n\nSince this runs in-browser, copy each file individually.\n\n## Files to create:\n\n` +
    Object.keys(generatedFiles).map(k => {
      const isScript = k.endsWith('.js');
      return `### ${isScript ? k : 'posts/' + k + '.md'}\nCopy content from the viewer tab "${k}"\n`;
    }).join('\n') +
    `\n## Git commands after saving files:\n\`\`\`bash\ngit add posts/ public/sitemap.xml sitemap-update.js\ngit commit -m "feat: add 10 SEO blog articles + sitemap update"\ngit push origin main\n\`\`\``;
  navigator.clipboard.writeText(instructions);
  setStatus('Download instructions copied to clipboard.');
}

function copyGitInstructions() {
  const cmds = `# Git push instructions for JobLynk SEO articles

## 1. Save each .md file into your posts/ (or content/blog/) directory:
${Object.keys(generatedFiles).filter(k => !k.endsWith('.js')).map(k => `   posts/${k}.md`).join('\n')}

## 2. Save the sitemap script:
   sitemap-update.js (in project root)

## 3. Run sitemap generator:
   node sitemap-update.js

## 4. Git push:
   git add posts/ public/sitemap.xml sitemap-update.js
   git commit -m "feat: add 10 SEO blog articles with internal linking + sitemap"
   git push origin main

## 5. Verify sitemap live at:
   ${BASE_URL}/sitemap.xml`;
  navigator.clipboard.writeText(cmds);
  setStatus('Git instructions copied to clipboard.');
}

renderTopics();
</script>
