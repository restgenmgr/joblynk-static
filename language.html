<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language | JobLynk.live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #4a0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #2d0000;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        h1 { color: #fbbf24; margin-bottom: 10px; font-size: 2rem; }
        .subtitle { color: #d4b896; margin-bottom: 30px; }
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        .lang-btn {
            background: #4a0000;
            color: #fbbf24;
            border: 2px solid #fbbf24;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: #fbbf24;
            color: #1a0000;
            transform: scale(1.02);
        }
        .back-link { color: #d4b896; text-decoration: none; display: inline-block; margin-top: 20px; }
        .back-link:hover { color: #fbbf24; }
        hr { border-color: #4a0000; margin: 20px 0; }
        .note { color: #d4b896; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Select Your Language</h1>
        <p class="subtitle">Click a language to translate the entire website</p>
        
        <div class="lang-grid">
            <button class="lang-btn" onclick="translateSite('en')">🇬🇧 English</button>
            <button class="lang-btn" onclick="translateSite('hi')">🇮🇳 Hindi</button>
            <button class="lang-btn" onclick="translateSite('ta')">🇮🇳 Tamil</button>
            <button class="lang-btn" onclick="translateSite('te')">🇮🇳 Telugu</button>
            <button class="lang-btn" onclick="translateSite('mr')">🇮🇳 Marathi</button>
            <button class="lang-btn" onclick="translateSite('bn')">🇮🇳 Bengali</button>
            <button class="lang-btn" onclick="translateSite('ur')">🇮🇳 Urdu</button>
            <button class="lang-btn" onclick="translateSite('fr')">🇫🇷 French</button>
            <button class="lang-btn" onclick="translateSite('es')">🇪🇸 Spanish</button>
            <button class="lang-btn" onclick="translateSite('de')">🇩🇪 German</button>
            <button class="lang-btn" onclick="translateSite('it')">🇮🇹 Italian</button>
            <button class="lang-btn" onclick="translateSite('pt')">🇵🇹 Portuguese</button>
            <button class="lang-btn" onclick="translateSite('ru')">🇷🇺 Russian</button>
            <button class="lang-btn" onclick="translateSite('zh-CN')">🇨🇳 Chinese</button>
            <button class="lang-btn" onclick="translateSite('ja')">🇯🇵 Japanese</button>
            <button class="lang-btn" onclick="translateSite('ko')">🇰🇷 Korean</button>
            <button class="lang-btn" onclick="translateSite('ar')">🇸🇦 Arabic</button>
        </div>
        
        <hr>
        <a href="/" class="back-link">← Back to JobLynk.live</a>
        <p class="note">Powered by Google Translate | Translation may take a few seconds</p>
    </div>

    <script>
        function translateSite(lang) {
            if (lang === 'en') {
                window.location.href = '/';
                return;
            }
            // Show loading indicator on the clicked button
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Translating...';
            btn.disabled = true;
            
            // Redirect to Google Translate
            window.location.href = 'https://translate.google.com/translate?sl=en&tl=' + lang + '&u=' + encodeURIComponent('https://joblynk.live');
        }
    </script>
</body>
</html>
