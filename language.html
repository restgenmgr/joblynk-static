<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language | JobLynk.live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #4a0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #2d0000;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 { color: #fbbf24; margin-bottom: 10px; }
        .subtitle { color: #d4b896; margin-bottom: 30px; }
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        .lang-btn {
            background: #4a0000;
            color: #fbbf24;
            border: 2px solid #fbbf24;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: #fbbf24;
            color: #1a0000;
            transform: scale(1.02);
        }
        .back-link { color: #d4b896; text-decoration: none; }
        .back-link:hover { color: #fbbf24; }
        hr { border-color: #4a0000; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Select Your Language</h1>
        <p class="subtitle">Choose a language to translate the entire website</p>
        
        <div class="lang-grid">
            <button class="lang-btn" onclick="translateSite('en')">🇬🇧 English</button>
            <button class="lang-btn" onclick="translateSite('hi')">🇮🇳 Hindi - हिन्दी</button>
            <button class="lang-btn" onclick="translateSite('ta')">🇮🇳 Tamil - தமிழ்</button>
            <button class="lang-btn" onclick="translateSite('te')">🇮🇳 Telugu - తెలుగు</button>
            <button class="lang-btn" onclick="translateSite('mr')">🇮🇳 Marathi - मराठी</button>
            <button class="lang-btn" onclick="translateSite('bn')">🇮🇳 Bengali - বাংলা</button>
            <button class="lang-btn" onclick="translateSite('ur')">🇮🇳 Urdu - اردو</button>
            <button class="lang-btn" onclick="translateSite('fr')">🇫🇷 French - Français</button>
            <button class="lang-btn" onclick="translateSite('es')">🇪🇸 Spanish - Español</button>
            <button class="lang-btn" onclick="translateSite('de')">🇩🇪 German - Deutsch</button>
            <button class="lang-btn" onclick="translateSite('it')">🇮🇹 Italian - Italiano</button>
            <button class="lang-btn" onclick="translateSite('pt')">🇵🇹 Portuguese - Português</button>
            <button class="lang-btn" onclick="translateSite('ru')">🇷🇺 Russian - Русский</button>
            <button class="lang-btn" onclick="translateSite('zh-CN')">🇨🇳 Chinese - 中文</button>
            <button class="lang-btn" onclick="translateSite('ja')">🇯🇵 Japanese - 日本語</button>
            <button class="lang-btn" onclick="translateSite('ko')">🇰🇷 Korean - 한국어</button>
            <button class="lang-btn" onclick="translateSite('ar')">🇸🇦 Arabic - العربية</button>
        </div>
        
        <hr>
        <a href="/" class="back-link">← Back to JobLynk.live</a>
    </div>

    <script>
        function translateSite(lang) {
            if (lang === 'en') {
                window.location.href = '/';
                return;
            }
            // Redirect to Google Translate
            window.location.href = 'https://translate.google.com/translate?sl=en&tl=' + lang + '&u=' + encodeURIComponent('https://joblynk.live');
        }
    </script>
</body>
</html>
